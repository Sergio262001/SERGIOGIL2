<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservas | Barbería HG</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <main class="container">

    <header class="header">
      <img src="img/LOGO.jpeg" alt="Logo Barbería HG" class="logo">
      <h1>Barbería LA</h1>
      <h3>Cortes clásicos y estilo moderno</h3>
    </header>

    <section class="form-section">
      <h2>Nueva reserva</h2>

      <form id="formReserva">
        <label>
          Nombre
          <input type="text" id="nombre" placeholder="Tu nombre">
        </label>

        <label>
          Servicio
          <select id="servicio"></select>
        </label>

        <label>
          Fecha
          <input type="date" id="fecha">
        </label>

        <label>
          Hora
          <select id="hora"></select>
        </label>

        <button type="submit" id="btnSubmit">Reservar</button>
        <button type="button" id="btnCancelar" class="cancelar" style="display:none;">
          Cancelar edición
        </button>
      </form>

      <p id="mensaje"></p>
    </section>

    <section class="reservas-section">
      <h2>Reservas realizadas</h2>
      <ul id="listaReservas"></ul>
    </section>

  </main>

  <script src="js/app.js" defer></script>
</body>
</html>
